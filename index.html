<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAND IN HAND · 手助网吧 - 加盟结算平台</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #E74C3C;
            --primary-dark: #C0392B;
            --primary-light: #FF6B5B;
            --success: #52c41a;
            --warning: #faad14;
            --error: #ff4d4f;
            --bg-dark: #141414;
            --bg-card: rgba(20, 20, 20, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: rgba(255, 255, 255, 0.9);
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.45);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated mesh gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(231, 76, 60, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 107, 91, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(231, 76, 60, 0.05) 0%, transparent 70%);
            animation: BGMesh 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes BGMesh {
            0%, 100% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.1) rotate(1deg); }
            66% { transform: scale(0.95) rotate(-1deg); }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: OrbFloat 20s infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -200px;
            right: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--primary-light);
            bottom: -150px;
            left: -150px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(192, 57, 43, 0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        @keyframes OrbFloat {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, 50px); }
            50% { transform: translate(-30px, 80px); }
            75% { transform: translate(40px, -40px); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 25px 50px rgba(0, 0, 0, 0.4),
                0 0 100px rgba(231, 76, 60, 0.1);
            animation: CardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        @keyframes CardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 24px;
            font-size: 12px;
            color: var(--primary-light);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #E74C3C 0%, #C0392B 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            animation: LogoFloat 6s ease-in-out infinite;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            animation: Shine 3s ease-in-out infinite;
        }

        .logo::after {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            border-radius: 22px;
            opacity: 0.3;
            z-index: -1;
            animation: LogoGlow 2s ease-in-out infinite;
        }

        @keyframes LogoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes LogoGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.15; }
        }

        @keyframes Shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .logo-text {
            font-size: 36px;
            font-weight: 900;
            color: white;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .role-selector {
            margin-bottom: 32px;
        }

        .role-tabs {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .role-tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .role-tab::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 10px;
        }

        .role-tab:hover::before {
            opacity: 0.1;
        }

        .role-tab.active::before {
            opacity: 1;
        }

        .role-tab.active {
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .role-icon {
            font-size: 22px;
            position: relative;
            z-index: 1;
        }

        .role-text {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            position: relative;
            z-index: 1;
            transition: color 0.3s;
        }

        .role-tab.active .role-text {
            color: #fff;
            font-weight: 600;
        }

        .login-method {
            animation: FadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes FadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .method-header {
            margin-bottom: 28px;
        }

        .method-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .method-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .oa-login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .oa-login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .oa-login-btn:hover::before {
            left: 100%;
        }

        .oa-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }

        .oa-login-btn:active {
            transform: translateY(0);
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-tertiary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .remember-me:hover {
            color: var(--text-primary);
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .forgot-password:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            animation: SlideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        @keyframes SlideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(82, 196, 26, 0.1);
            border: 1px solid rgba(82, 196, 26, 0.3);
            color: var(--success);
        }

        .message.error {
            background: rgba(255, 77, 79, 0.1);
            border: 1px solid rgba(255, 77, 79, 0.3);
            color: var(--error);
        }

        .message.info {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: var(--primary-light);
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-tertiary);
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: var(--primary-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: var(--primary);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 16px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .logo {
                width: 60px;
                height: 60px;
                border-radius: 16px;
            }

            .logo svg {
                width: 32px;
                height: 32px;
            }

            .role-tab {
                padding: 10px 6px;
            }

            .role-icon {
                font-size: 20px;
            }

            .role-text {
                font-size: 11px;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: Spin 0.6s linear infinite;
        }

        @keyframes Spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .tooltip:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    手助网吧加盟
                </div>
                
                <div class="logo-wrapper">
                    <div class="logo">
                        <span class="logo-text">霸</span>
                    </div>
                </div>

                <h1>HAND IN HAND · 手助网吧</h1>
                <p class="subtitle">加盟结算平台</p>
            </div>

            <div class="role-selector">
                <div class="role-tabs">
                    <button class="role-tab active" data-role="admin" onclick="switchRole('admin')">
                        <span class="role-icon">🛡️</span>
                        <span class="role-text">运营后台</span>
                    </button>
                    <button class="role-tab" data-role="agent" onclick="switchRole('agent')">
                        <span class="role-icon">🤝</span>
                        <span class="role-text">代理</span>
                    </button>
                    <button class="role-tab" data-role="owner" onclick="switchRole('owner')">
                        <span class="role-icon">🎮</span>
                        <span class="role-text">网吧主</span>
                    </button>
                </div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div id="adminLogin" class="login-method">
                    <div class="method-header">
                        <h3>内部管理员登录</h3>
                        <p>请使用 OA 账号登录系统</p>
                    </div>
                    
                    <div class="divider">
                        <div class="divider-line"></div>
                        <span class="divider-text">企业认证</span>
                        <div class="divider-line"></div>
                    </div>

                    <button type="button" class="oa-login-btn" onclick="handleOALogin()">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0zm0 3a3 3 0 110 6 3 3 0 010-6zm0 14c-2.5 0-4.71-1.28-6-3.22.03-2 4-3.08 6-3.08s5.97 1.08 6 3.08A7.18 7.18 0 0110 17z"/>
                        </svg>
                        OA 一键登录
                    </button>

                    <div style="margin-top: 16px; text-align: center;">
                        <span style="font-size: 12px; color: rgba(255, 255, 255, 0.3);">仅限内部管理员使用</span>
                    </div>
                </div>

                <div id="agentLogin" class="login-method" style="display: none;">
                    <div class="method-header">
                        <h3>代理登录</h3>
                        <p>请输入账号密码登录</p>
                    </div>
                    
                    <div class="form-group">
                        <label for="agentAccount">账号</label>
                        <input type="text" id="agentAccount" placeholder="请输入代理账号" autocomplete="username" />
                    </div>
                    <div class="form-group">
                        <label for="agentPassword">密码</label>
                        <input type="password" id="agentPassword" placeholder="请输入密码" autocomplete="current-password" />
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                </div>

                <div id="ownerLogin" class="login-method" style="display: none;">
                    <div class="method-header">
                        <h3>网吧主登录</h3>
                        <p>请输入账号密码登录</p>
                    </div>
                    
                    <div class="form-group">
                        <label for="ownerAccount">账号</label>
                        <input type="text" id="ownerAccount" placeholder="请输入网吧主账号" autocomplete="username" />
                    </div>
                    <div class="form-group">
                        <label for="ownerPassword">密码</label>
                        <input type="password" id="ownerPassword" placeholder="请输入密码" autocomplete="current-password" />
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" />
                            <span>记住账号</span>
                        </label>
                        <a href="javascript:void(0)" class="forgot-password">忘记密码？</a>
                    </div>

                    <button type="submit" class="login-btn">登录</button>
                </div>
            </form>

            <div id="message" class="message" style="display: none;"></div>

        <div style="text-align: center; margin-top: 24px;">
            <span style="font-size: 14px; color: var(--text-secondary);">还不是加盟商？</span>
            <a href="register.html" style="font-size: 14px; color: var(--primary-light); text-decoration: none; font-weight: 500; margin-left: 4px; transition: color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--primary-light)'">点此申请入驻注册 →</a>
        </div>
        </div>

        <div class="footer">
            <p>© 2024 HAND IN HAND · 手助网吧 加盟结算平台 v1.0.0</p>
            <p>技术支持：腾讯应用宝 | <a href="javascript:void(0)" style="color: var(--primary-light);">帮助中心</a></p>
        </div>
    </div>

    <script>
        let currentRole = 'admin';

        function switchRole(role) {
            currentRole = role;
            
            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
            
            document.querySelectorAll('.login-method').forEach(method => {
                method.style.display = 'none';
            });
            
            document.getElementById(`${role}Login`).style.display = 'block';
            
            hideMessage();
        }

        function handleOALogin() {
            const btn = event.target.closest('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> 正在跳转...';
            btn.disabled = true;
            
            showMessage('正在跳转到 OA 登录...', 'info');
            
            setTimeout(() => {
                const mockOAResponse = {
                    success: true,
                    user: {
                        id: 'admin_001',
                        name: '管理员张三',
                        role: 'admin',
                        email: 'zhangsan@company.com'
                    }
                };
                
                if (mockOAResponse.success) {
                    showMessage('OA 登录成功！正在跳转...', 'success');
                    localStorage.setItem('user', JSON.stringify(mockOAResponse.user));
                    
                    setTimeout(() => {
                        alert(`欢迎回来，${mockOAResponse.user.name}！\n\n角色：运营后台管理员\n\n功能权限：\n• 管理所有代理和网吧主\n• 查看全平台数据\n• 系统配置\n• 结算管理\n\n（这是演示，实际应跳转到后台首页）`);
                        btn.innerHTML = originalHTML;
                        btn.disabled = false;
                    }, 1000);
                }
            }, 1500);
        }

        function handleLogin(event) {
            event.preventDefault();
            
            let account, password, loginBtn;
            
            if (currentRole === 'agent') {
                account = document.getElementById('agentAccount').value;
                password = document.getElementById('agentPassword').value;
                loginBtn = event.target.querySelector('.login-btn');
            } else if (currentRole === 'owner') {
                account = document.getElementById('ownerAccount').value;
                password = document.getElementById('ownerPassword').value;
                loginBtn = event.target.querySelector('.login-btn');
            }
            
            if (!account || !password) {
                showMessage('请输入账号和密码', 'error');
                return;
            }
            
            const originalHTML = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';
            loginBtn.disabled = true;
            
            showMessage('正在登录...', 'info');
            
            setTimeout(() => {
                const mockLoginResponse = authenticate(account, password, currentRole);
                
                if (mockLoginResponse.success) {
                    showMessage('登录成功！正在跳转...', 'success');
                    localStorage.setItem('user', JSON.stringify(mockLoginResponse.user));
                    
                    if (currentRole === 'owner' && document.getElementById('remember').checked) {
                        localStorage.setItem('rememberedAccount', account);
                    }
                    
                    setTimeout(() => {
                        const roleNames = {
                            'admin': '运营后台',
                            'agent': '代理',
                            'owner': '网吧主'
                        };
                        
                        const roleFeatures = {
                            'admin': '• 管理所有代理和网吧主\n• 查看全平台数据\n• 系统配置\n• 结算管理',
                            'agent': '• 查看名下所有网吧主数据\n• 结算管理\n• 数据统计\n• 网吧管理',
                            'owner': '• 查看网吧营业数据\n• 结算查询\n• 账号管理\n• 数据报表'
                        };
                        
                        alert(`欢迎回来，${mockLoginResponse.user.name}！\n\n角色：${roleNames[currentRole]}\n\n功能权限：\n${roleFeatures[currentRole]}\n\n（这是演示，实际应跳转到后台首页）`);
                        loginBtn.innerHTML = originalHTML;
                        loginBtn.disabled = false;
                    }, 1000);
                } else {
                    showMessage(mockLoginResponse.message || '登录失败，请检查账号密码', 'error');
                    loginBtn.innerHTML = originalHTML;
                    loginBtn.disabled = false;
                }
            }, 1500);
        }

        function authenticate(account, password, role) {
            const mockUsers = {
                'agent': [
                    { id: 'agent_001', account: 'agent001', password: '123456', name: '代理李四', role: 'agent' }
                ],
                'owner': [
                    { id: 'owner_001', account: 'owner001', password: '123456', name: '网吧主王五', role: 'owner', agentId: 'agent_001' }
                ]
            };
            
            const users = mockUsers[role] || [];
            const user = users.find(u => u.account === account && u.password === password);
            
            if (user) {
                return { success: true, user: user };
            } else {
                return { success: false, message: '账号或密码错误' };
            }
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
        }

        function hideMessage() {
            const messageEl = document.getElementById('message');
            messageEl.style.display = 'none';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const rememberedAccount = localStorage.getItem('rememberedAccount');
            if (rememberedAccount) {
                document.getElementById('ownerAccount').value = rememberedAccount;
                document.getElementById('remember').checked = true;
            }
            
            const user = localStorage.getItem('user');
            if (user) {
                const userInfo = JSON.parse(user);
                console.log(`检测到已登录用户：${userInfo.name}`);
            }
        });
    </script>
</body>
</html>
