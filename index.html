<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手助网吧加盟结算系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --secondary: #0ea5e9;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            animation: BGMove 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes BGMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.1) rotate(1deg); }
            66% { transform: scale(0.95) rotate(-1deg); }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--primary-light);
            border-radius: 50%;
            opacity: 0.3;
            animation: Float 15s infinite;
        }

        .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 60%; left: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { top: 80%; left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { top: 40%; left: 60%; animation-delay: 6s; }
        .particle:nth-child(5) { top: 10%; left: 90%; animation-delay: 8s; }

        @keyframes Float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(20px); opacity: 0.6; }
            50% { transform: translateY(10px) translateX(-20px); opacity: 0.3; }
            75% { transform: translateY(-20px) translateX(10px); opacity: 0.5; }
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(99, 102, 241, 0.1);
            animation: CardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            animation: Shimmer 3s infinite;
        }

        @keyframes Shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes CardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-wrapper {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            animation: LogoFloat 6s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .logo::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 22px;
            opacity: 0.3;
            z-index: -1;
            animation: Pulse 2s ease-in-out infinite;
        }

        @keyframes LogoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes Pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }

        .logo svg {
            width: 40px;
            height: 40px;
        }

        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--gray-400);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .role-selector {
            margin-bottom: 32px;
        }

        .role-tabs {
            display: flex;
            gap: 6px;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px;
            border-radius: 14px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .role-tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .role-tab::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 10px;
        }

        .role-tab:hover::before {
            opacity: 0.1;
        }

        .role-tab.active::before {
            opacity: 1;
        }

        .role-tab.active {
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .role-icon {
            font-size: 22px;
            position: relative;
            z-index: 1;
        }

        .role-text {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 500;
            position: relative;
            z-index: 1;
            transition: color 0.3s;
        }

        .role-tab.active .role-text {
            color: #fff;
            font-weight: 600;
        }

        .login-method {
            animation: FadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes FadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .method-header {
            margin-bottom: 28px;
        }

        .method-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .method-header p {
            font-size: 14px;
            color: var(--gray-400);
        }

        .oa-login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .oa-login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .oa-login-btn:hover::before {
            left: 100%;
        }

        .oa-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .oa-login-btn:active {
            transform: translateY(0);
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--gray-300);
            margin-bottom: 10px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-group input::placeholder {
            color: var(--gray-500);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--gray-400);
            transition: color 0.3s;
        }

        .remember-me:hover {
            color: var(--gray-300);
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .forgot-password:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            animation: SlideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        @keyframes SlideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .message.info {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--primary-light);
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--gray-500);
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: var(--primary-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .logo {
                width: 60px;
                height: 60px;
                border-radius: 16px;
            }

            .logo svg {
                width: 32px;
                height: 32px;
            }

            .role-tab {
                padding: 10px 6px;
            }

            .role-icon {
                font-size: 20px;
            }

            .role-text {
                font-size: 11px;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: Spin 0.6s linear infinite;
        }

        @keyframes Spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <div class="logo">
                        <svg viewBox="0 0 48 48" fill="none">
                            <rect width="48" height="48" rx="8" fill="transparent"/>
                            <path d="M12 16h24v2H12zm0 6h24v2H12zm0 6h18v2H12z" fill="white"/>
                            <circle cx="36" cy="36" r="8" fill="rgba(255,255,255,0.2)"/>
                            <path d="M34 36l3 3 5-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
                <h1>手助网吧加盟结算系统</h1>
                <p class="subtitle">Cyber Cafe Franchise Settlement System</p>
            </div>

            <div class="role-selector">
                <div class="role-tabs">
                    <button class="role-tab active" data-role="admin" onclick="switchRole('admin')">
                        <span class="role-icon">🔧</span>
                        <span class="role-text">运营后台</span>
                    </button>
                    <button class="role-tab" data-role="agent" onclick="switchRole('agent')">
                        <span class="role-icon">👔</span>
                        <span class="role-text">代理</span>
                    </button>
                    <button class="role-tab" data-role="owner" onclick="switchRole('owner')">
                        <span class="role-icon">🏪</span>
                        <span class="role-text">网吧主</span>
                    </button>
                </div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div id="adminLogin" class="login-method">
                    <div class="method-header">
                        <h3>内部管理员登录</h3>
                        <p>请使用 OA 账号登录系统</p>
                    </div>
                    <button type="button" class="oa-login-btn" onclick="handleOALogin()">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0zm0 3a3 3 0 110 6 3 3 0 010-6zm0 14c-2.5 0-4.71-1.28-6-3.22.03-2 4-3.08 6-3.08s5.97 1.08 6 3.08A7.18 7.18 0 0110 17z"/>
                        </svg>
                        OA 一键登录
                    </button>
                </div>

                <div id="agentLogin" class="login-method" style="display: none;">
                    <div class="method-header">
                        <h3>代理登录</h3>
                        <p>请输入账号密码登录</p>
                    </div>
                    <div class="form-group">
                        <label for="agentAccount">账号</label>
                        <input type="text" id="agentAccount" placeholder="请输入代理账号" autocomplete="username" />
                    </div>
                    <div class="form-group">
                        <label for="agentPassword">密码</label>
                        <input type="password" id="agentPassword" placeholder="请输入密码" autocomplete="current-password" />
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                </div>

                <div id="ownerLogin" class="login-method" style="display: none;">
                    <div class="method-header">
                        <h3>网吧主登录</h3>
                        <p>请输入账号密码登录</p>
                    </div>
                    <div class="form-group">
                        <label for="ownerAccount">账号</label>
                        <input type="text" id="ownerAccount" placeholder="请输入网吧主账号" autocomplete="username" />
                    </div>
                    <div class="form-group">
                        <label for="ownerPassword">密码</label>
                        <input type="password" id="ownerPassword" placeholder="请输入密码" autocomplete="current-password" />
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" />
                            <span>记住账号</span>
                        </label>
                        <a href="javascript:void(0)" class="forgot-password">忘记密码？</a>
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                </div>
            </form>

            <div id="message" class="message" style="display: none;"></div>
        </div>

        <div class="footer">
            <p>© 2024 手助网吧加盟结算系统 v1.0.0</p>
            <p>技术支持：手助科技</p>
        </div>
    </div>

    <script>
        let currentRole = 'admin';

        function switchRole(role) {
            currentRole = role;
            
            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
            
            document.querySelectorAll('.login-method').forEach(method => {
                method.style.display = 'none';
            });
            
            document.getElementById(`${role}Login`).style.display = 'block';
            
            hideMessage();
        }

        function handleOALogin() {
            const btn = event.target.closest('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> 正在跳转...';
            btn.disabled = true;
            
            showMessage('正在跳转到 OA 登录...', 'info');
            
            setTimeout(() => {
                const mockOAResponse = {
                    success: true,
                    user: {
                        id: 'admin_001',
                        name: '管理员张三',
                        role: 'admin',
                        email: 'zhangsan@company.com'
                    }
                };
                
                if (mockOAResponse.success) {
                    showMessage('OA 登录成功！正在跳转...', 'success');
                    localStorage.setItem('user', JSON.stringify(mockOAResponse.user));
                    
                    setTimeout(() => {
                        alert(`欢迎回来，${mockOAResponse.user.name}！\n\n角色：运营后台管理员\n\n（这是演示，实际应跳转到后台首页）`);
                        btn.innerHTML = originalHTML;
                        btn.disabled = false;
                    }, 1000);
                }
            }, 1500);
        }

        function handleLogin(event) {
            event.preventDefault();
            
            let account, password, loginBtn;
            
            if (currentRole === 'agent') {
                account = document.getElementById('agentAccount').value;
                password = document.getElementById('agentPassword').value;
                loginBtn = event.target.querySelector('.login-btn');
            } else if (currentRole === 'owner') {
                account = document.getElementById('ownerAccount').value;
                password = document.getElementById('ownerPassword').value;
                loginBtn = event.target.querySelector('.login-btn');
            }
            
            if (!account || !password) {
                showMessage('请输入账号和密码', 'error');
                return;
            }
            
            const originalHTML = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';
            loginBtn.disabled = true;
            
            showMessage('正在登录...', 'info');
            
            setTimeout(() => {
                const mockLoginResponse = authenticate(account, password, currentRole);
                
                if (mockLoginResponse.success) {
                    showMessage('登录成功！正在跳转...', 'success');
                    localStorage.setItem('user', JSON.stringify(mockLoginResponse.user));
                    
                    if (currentRole === 'owner' && document.getElementById('remember').checked) {
                        localStorage.setItem('rememberedAccount', account);
                    }
                    
                    setTimeout(() => {
                        const roleNames = {
                            'admin': '运营后台',
                            'agent': '代理',
                            'owner': '网吧主'
                        };
                        alert(`欢迎回来，${mockLoginResponse.user.name}！\n\n角色：${roleNames[currentRole]}\n\n（这是演示，实际应跳转到后台首页）\n\n功能说明：\n${getRoleFeatures(currentRole)}`);
                        loginBtn.innerHTML = originalHTML;
                        loginBtn.disabled = false;
                    }, 1000);
                } else {
                    showMessage(mockLoginResponse.message || '登录失败，请检查账号密码', 'error');
                    loginBtn.innerHTML = originalHTML;
                    loginBtn.disabled = false;
                }
            }, 1500);
        }

        function authenticate(account, password, role) {
            const mockUsers = {
                'agent': [
                    { id: 'agent_001', account: 'agent001', password: '123456', name: '代理李四', role: 'agent' }
                ],
                'owner': [
                    { id: 'owner_001', account: 'owner001', password: '123456', name: '网吧主王五', role: 'owner', agentId: 'agent_001' }
                ]
            };
            
            const users = mockUsers[role] || [];
            const user = users.find(u => u.account === account && u.password === password);
            
            if (user) {
                return { success: true, user: user };
            } else {
                return { success: false, message: '账号或密码错误' };
            }
        }

        function getRoleFeatures(role) {
            const features = {
                'admin': '- 管理所有代理和网吧主\n- 查看全平台数据\n- 系统配置',
                'agent': '- 查看名下所有网吧主数据\n- 结算管理\n- 数据统计',
                'owner': '- 查看网吧营业数据\n- 结算查询\n- 账号管理'
            };
            return features[role] || '';
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
        }

        function hideMessage() {
            const messageEl = document.getElementById('message');
            messageEl.style.display = 'none';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const rememberedAccount = localStorage.getItem('rememberedAccount');
            if (rememberedAccount) {
                document.getElementById('ownerAccount').value = rememberedAccount;
                document.getElementById('remember').checked = true;
            }
            
            const user = localStorage.getItem('user');
            if (user) {
                const userInfo = JSON.parse(user);
                console.log(`检测到已登录用户：${userInfo.name}`);
            }
        });
    </script>
</body>
</html>
