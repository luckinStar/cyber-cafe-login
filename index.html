<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手助网吧加盟结算系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <rect width="48" height="48" rx="8" fill="#1890ff"/>
                        <path d="M14 18h20v2H14zm0 5h20v2H14zm0 5h15v2H14z" fill="white"/>
                    </svg>
                </div>
                <h1>手助网吧加盟结算系统</h1>
                <p class="subtitle">Cyber Cafe Franchise Settlement System</p>
            </div>

            <div class="role-selector">
                <div class="role-tabs">
                    <button class="role-tab active" data-role="admin" onclick="switchRole('admin')">
                        <span class="role-icon">🔧</span>
                        <span class="role-text">运营后台</span>
                    </button>
                    <button class="role-tab" data-role="agent" onclick="switchRole('agent')">
                        <span class="role-icon">👔</span>
                        <span class="role-text">代理</span>
                    </button>
                    <button class="role-tab" data-role="owner" onclick="switchRole('owner')">
                        <span class="role-icon">🏪</span>
                        <span class="role-text">网吧主</span>
                    </button>
                </div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div id="adminLogin" class="login-method">
                    <div class="method-header">
                        <h3>内部管理员登录</h3>
                        <p>请使用OA账号登录系统</p>
                    </div>
                    <button type="button" class="oa-login-btn" onclick="handleOALogin()">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0zm0 3a3 3 0 110 6 3 3 0 010-6zm0 14c-2.5 0-4.71-1.28-6-3.22.03-2 4-3.08 6-3.08s5.97 1.08 6 3.08A7.18 7.18 0 0110 17z"/>
                        </svg>
                        OA 一键登录
                    </button>
                </div>

                <div id="agentLogin" class="login-method" style="display: none;">
                    <div class="method-header">
                        <h3>代理登录</h3>
                        <p>请输入账号密码登录</p>
                    </div>
                    <div class="form-group">
                        <label for="agentAccount">账号</label>
                        <input type="text" id="agentAccount" placeholder="请输入代理账号" />
                    </div>
                    <div class="form-group">
                        <label for="agentPassword">密码</label>
                        <input type="password" id="agentPassword" placeholder="请输入密码" />
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                </div>

                <div id="ownerLogin" class="login-method" style="display: none;">
                    <div class="method-header">
                        <h3>网吧主登录</h3>
                        <p>请输入账号密码登录</p>
                    </div>
                    <div class="form-group">
                        <label for="ownerAccount">账号</label>
                        <input type="text" id="ownerAccount" placeholder="请输入网吧主账号" />
                    </div>
                    <div class="form-group">
                        <label for="ownerPassword">密码</label>
                        <input type="password" id="ownerPassword" placeholder="请输入密码" />
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" />
                            <span>记住账号</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                </div>
            </form>

            <div id="message" class="message" style="display: none;"></div>
        </div>

        <div class="footer">
            <p>© 2024 手助网吧加盟结算系统 v1.0.0</p>
            <p>技术支持：手助科技</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
